<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小工具 · 张剑</title>
  <meta name="description" content="张剑整理的小工具集合，包括提示词优化器等实用的研究辅助工具。">
  <link rel="stylesheet" href="../assets/site.css">
</head>
<body class="home-page">
  <header class="site-header">
    <nav class="site-nav" aria-label="主导航">
      <div class="container nav-inner">
        <a class="site-brand" href="../">张剑 <span>/ Jian Zhang</span></a>
        <div class="nav-links">
          <a href="../">首页</a>
          <a href="../cv/">个人简历</a>
          <a href="https://jefeerzhang.github.io/master-course/">硕士课程</a>
          <a href="../knowledge/">知识学习</a>
          <a href="./" aria-current="page">小工具</a>
        </div>
      </div>
    </nav>
  </header>

  <main id="main-content">
    <section class="container hub-hero" aria-labelledby="hub-title">
      <p class="eyebrow">Tools · Utilities</p>
      <h1 id="hub-title">小工具</h1>
      <p>随手可用、提升研究效率的小工具合集。点开即用，部分工具为外部服务。</p>
    </section>

    <section class="container columns-section" aria-labelledby="columns-title">
      <h2 id="columns-title" class="section-heading">
        工具列表
        <p>选择一个工具开始使用。</p>
      </h2>

      <div class="tools-grid">

        <a class="tool-card" href="https://prompt.always200.com/#/basic/system" target="_blank" rel="noopener">
          <img class="tool-icon" src="../assets/prompt-optimizer.svg" alt="" loading="lazy">
          <div class="tool-body">
            <h3>提示词优化器</h3>
            <p>优化系统提示词与任务指令，让 AI 更准确地理解你的需求。</p>
          </div>
          <div class="tool-meta">
            <span>打开工具</span>
            <span class="tool-arrow" aria-hidden="true">↗</span>
          </div>
        </a>

        <a class="tool-card" href="https://github.com/jefeerzhang/myskill" target="_blank" rel="noopener">
          <img class="tool-icon" src="../assets/myskill.svg" alt="" loading="lazy">
          <div class="tool-body">
            <h3>自定义技能</h3>
            <p>开源的 AI 学术技能库：学术写作润色、文献综述、社科基金申报与量化作图，开箱即用。</p>
          </div>
          <div class="tool-meta">
            <span>GitHub 仓库</span>
            <span class="tool-arrow" aria-hidden="true">↗</span>
          </div>
        </a>

        <div class="tool-card is-coming" aria-disabled="true">
          <span class="tool-icon tool-icon--placeholder" aria-hidden="true"></span>
          <div class="tool-body">
            <h3>更多工具</h3>
            <p>文献整理、计量辅助等更多小工具正在筹备中，敬请期待。</p>
          </div>
          <div class="tool-meta">
            <span class="tool-meta__pill">即将上线</span>
          </div>
        </div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>由 GitHub Pages 托管</span>
      <div class="footer-links">
        <a href="https://github.com/jefeerzhang" target="_blank" rel="noopener">GitHub</a>
        <a href="https://orcid.org/0000-0002-8024-5483" target="_blank" rel="noopener">ORCID</a>
      </div>
    </div>
  </footer>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小工具 · 张剑</title>
  <meta name="description" content="张剑整理的小工具集合，包括提示词优化器等实用的研究辅助工具。">
  <link rel="stylesheet" href="../assets/site.css">
  <style>
    .hub-hero {
      padding-block: 64px 48px;
      border-bottom: 1px solid var(--line-strong);
    }
    .hub-hero .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .hub-hero h1 {
      font-family: var(--serif);
      font-size: clamp(40px, 6vw, 64px);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 14px;
    }
    .hub-hero p {
      color: var(--text);
      font-size: 16px;
      line-height: 1.7;
      max-width: 560px;
    }

    .columns-section {
      padding-block: 52px 84px;
    }
    .columns-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 22px;
      margin-top: 30px;
    }
    .tool-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 30px 28px;
      min-height: 210px;
      transition: border-color 200ms ease, box-shadow 200ms ease, transform 200ms ease;
    }
    .tool-card:hover {
      border-color: var(--accent);
      box-shadow: 0 10px 34px rgba(31, 59, 45, 0.1);
      transform: translateY(-3px);
    }
    .tool-card .tool-glyph {
      width: 56px;
      height: 56px;
      overflow: hidden;
      border-radius: 10px;
      background: var(--surface-soft);
      margin-bottom: 18px;
    }
    .tool-card .tool-glyph img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .tool-card h3 {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
    }
    .tool-card p {
      color: var(--text);
      font-size: 14px;
      line-height: 1.65;
    }
    .tool-card .col-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }
    .tool-card .col-arrow {
      font-size: 20px;
      transition: transform 180ms ease;
    }
    .tool-card:hover .col-arrow {
      transform: translateX(4px);
    }

    .tool-card.is-coming {
      background: transparent;
      border-style: dashed;
      border-color: var(--line-strong);
      color: var(--muted);
      cursor: default;
    }
    .tool-card.is-coming:hover {
      border-color: var(--line-strong);
      box-shadow: none;
      transform: none;
    }
    .tool-card.is-coming h3,
    .tool-card.is-coming p,
    .tool-card.is-coming .col-meta {
      color: var(--muted);
    }
    .tool-card.is-coming .col-meta {
      border-top-color: var(--line);
    }

    @media (max-width: 760px) {
      .hub-hero {
        padding-block: 48px 40px;
      }
      .columns-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="home-page">
  <header class="site-header">
    <nav class="site-nav" aria-label="主导航">
      <div class="container nav-inner">
        <a class="site-brand" href="../">张剑 <span>/ Jian Zhang</span></a>
        <div class="nav-links">
          <a href="../">首页</a>
          <a href="../cv/">个人简历</a>
          <a href="https://jefeerzhang.github.io/master-course/">硕士课程</a>
          <a href="../cv/#skills">自定义技能</a>
          <a href="../knowledge/">知识学习</a>
          <a href="./" aria-current="page">小工具</a>
        </div>
      </div>
    </nav>
  </header>

  <main id="main-content">
    <section class="container hub-hero" aria-labelledby="hub-title">
      <p class="eyebrow">Tools · Utilities</p>
      <h1 id="hub-title">小工具</h1>
      <p>随手可用、提升研究效率的小工具合集。点开即用，部分工具为外部服务。</p>
    </section>

    <section class="container columns-section" aria-labelledby="columns-title">
      <h2 id="columns-title" class="section-heading" style="margin-bottom: 0;">
        工具列表
        <p>选择一个工具开始使用。</p>
      </h2>

      <div class="columns-grid">

        <a class="tool-card" href="https://prompt.always200.com/#/basic/system" target="_blank" rel="noopener">
          <div class="tool-glyph">
            <img src="../assets/prompt-optimizer.png" alt="提示词优化器图标" width="256" height="256" loading="lazy">
          </div>
          <div>
            <h3>提示词优化器</h3>
            <p>优化系统提示词与任务指令，让 AI 更准确地理解你的需求。</p>
          </div>
          <div class="col-meta">
            <span>打开工具 ↗</span>
            <span class="col-arrow" aria-hidden="true">→</span>
          </div>
        </a>

        <div class="tool-card is-coming" aria-disabled="true">
          <div class="tool-glyph"></div>
          <div>
            <h3>更多工具</h3>
            <p>文献整理、计量辅助等更多小工具正在筹备中，敬请期待。</p>
          </div>
          <div class="col-meta">
            <span>即将上线</span>
            <span class="col-arrow" aria-hidden="true">···</span>
          </div>
        </div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>由 GitHub Pages 托管</span>
      <div class="footer-links">
        <a href="https://github.com/jefeerzhang" target="_blank" rel="noopener">GitHub</a>
        <a href="https://orcid.org/0000-0002-8024-5483" target="_blank" rel="noopener">ORCID</a>
      </div>
    </div>
  </footer>
</body>
</html>
